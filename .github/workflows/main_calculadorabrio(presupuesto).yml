name: Build and deploy Laravel app to Azure Web App - calculadorabrio

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_WEBAPP_NAME: calculadorabrio
  AZURE_WEBAPP_SLOT_NAME: presupuesto
  PHP_VERSION: '8.2'
  NODE_VERSION: '24'
  AZURE_CORE_OUTPUT: none

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare deployment package
        run: |
          zip -r release.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "node_modules/*" \
            -x "storage/logs/*" \
            -x "storage/framework/cache/data/*" \
            -x "storage/framework/sessions/*" \
            -x "storage/framework/views/*"

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_806E3EE040CC4ABCBF5C8E44FF2B2F9B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8A194C90A0D24C1CB35A9A1DD7AF1AAC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9549F19D386D456AAC7749ABA0E5DE29 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: ${{ env.AZURE_WEBAPP_SLOT_NAME }}
          package: release.zip
