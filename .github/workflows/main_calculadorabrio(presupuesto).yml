# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - calculadorabrio

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: picking.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_FAAE7C0D754A437DB82947B0D7C9C563 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_83124F4BBC494AF4B29CA0ED7D81154D }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: picking.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_FAAE7C0D754A437DB82947B0D7C9C563 }}/calculadora-ok:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_806E3EE040CC4ABCBF5C8E44FF2B2F9B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8A194C90A0D24C1CB35A9A1DD7AF1AAC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9549F19D386D456AAC7749ABA0E5DE29 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'calculadorabrio'
          slot-name: 'presupuesto'
          images: 'picking.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_FAAE7C0D754A437DB82947B0D7C9C563 }}/calculadora-ok:${{ github.sha }}'
          